  <body>
    <nav class="navbar">
      <div class="container pt-4 ps-1">
        <img src="{% static "img\logo.png" %}" alt="logo" class="logo" />
        <!-- search filter -->
        <div class="search-bar ms-5 me-1">
          <select class="form-control search-option" id="search">
            <option value="">ALL CATEGORIES</option>
            <option value="0">SHIRTS</option>
            <option value="1">JEANS</option>
            <option value="2">T-SHIRTS</option>
            <option value="3">SHORTS</option>
          </select>
        </div>
        <!-- search bar -->
        <div class="me-auto">
          <form class="d-flex ms-auto" role="search">
            <input
              class="form-control search-option"
              type="search"
              placeholder="I'm searching for..."
              aria-label="Search"
            />
            <span class="material-symbols-outlined ms-2">search</span>
          </form>
        </div>
        <!-- nav icons -->
        <div>
          <a href="" class="nav-icons"><span class="material-symbols-outlined"> account_circle </span></a>
          <a href="" class="nav-icons"><span class="material-symbols-outlined"> favorite </span></a>
          <a href="" class="nav-icons"><span class="material-symbols-outlined"> shopping_cart </span></a>
        </div>
      </div>
    </nav>
