{% extends "base.html" %} {% load static %}
<title>{% block title %}Home{% endblock title %}</title>

{% block content %}

<!-- Products -->
<div class="container pt-5">
  <h2>Featured Products</h2>
  <div class="row">
    {% for i in products %}
    <!-- loop starts here.... -->

    <div class="col-lg-3 col-md-4 col-sm-6 pt-3 pb-3">
      <div class="card product-div">
        <a href={% url "item" %}">
          <div class="card-img">
            <img src="{{i.image.url}}" alt="" class="img-fluid item-img" />
          </div>
        </a>
        <div class="card-body">
          <div class="text-dark fs-6 lh-1 fw-bold">{{i.name}}</div>
          <div class="fs-6 text-body-tertiary fw-light pb-2">
            Price: ₹{{i.price}}
          </div>

          <a href="" class="btn btn-warning add-btn">Add to cart</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <!-- fixed social media icon -->
  <!-- need to work on it -->
  <div class="ms-auto social-media-div">
    <a href="" class="social-media-link">
      <i class="bx bxl-whatsapp social-media"></i>
    </a>
  </div>
</div>
{% endblock content %}
