{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static "css\style.css" %}">

    <title>AntiQuin</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="container pt-3">
        <img src="{% static "img\logo.png" %}" alt="logo" class="logo" />

        <div class="pt-3">
          <!-- search filter -->
          <ul class="search-bar-list rounded">
            <li class="mt-auto">
              <select class="form-control search-option" id="search">
                <option value="">All categories</option>
                <option value="0">SHIRTS</option>
                <option value="1">JEANS</option>
                <option value="2">T-SHIRTS</option>
                <option value="3">SHORTS</option>
              </select>
            </li>

            <li class="me-auto mt-auto">
              <form class="d-flex ms-1 mt-auto" role="search">
                <input
                  class="form-control search-option"
                  type="search"
                  placeholder="I'm searching for..."
                  aria-label="Search"
                />
                <a href=""><span class="material-symbols-outlined ms-3">search</span></a>
              </form>
            </li>
          </ul>
        </div>

        <!-- nav icons -->
        <div class="pt-3">
          <ul class="nav-icons">
          <li class="pe-3">
            <a href=""
            ><span class="material-symbols-outlined"> account_circle </span></a
          >
          </li>
          <li class="pe-3">
            <a href=""
            ><span class="material-symbols-outlined"> favorite </span></a
          >
          </li>
          <li>
            <a href=""
            ><span class="material-symbols-outlined"> shopping_cart </span></a
          >
          </li>
        </ul>
        </div>
        
        <!-- cart total -->
        <!-- need to work on backend -->
        <div class="pt-3">
          <ul style="list-style-type: none">
            <li>
              <span class="badge text-dark bg-dark-subtle text-wrap">Your Cart</span>
            </li>
            <li>
              <span>₹000.0</span>
            </li>
          </ul>
        </div>
        </div>
      </div>
    </nav>
    <hr />


    <div class="container pt-5">
      <h2>Featured Products</h2>
      <div class="row">
        {% for i in details %}
          <div class="col-lg-4 pt-3 pb-3">
            <div class="card product-div">
              <div class="card-body">
                <img src="{{i.product_img.url}}" alt="" class="img-fluid ">
                <div class="row pt-2 pb-3">
                  <div class="col-9">{{i.name}}</div>
                <div class="col-3 text-center">{{i.price}}</div>
                </div>
                <a href="" class="btn add-btn">Add to cart</atype=>
              </div>
            </div>
          </div>    
        {% endfor %}
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
